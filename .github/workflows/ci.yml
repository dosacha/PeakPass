name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  install-lint-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: peakpass
          POSTGRES_PASSWORD: peakpass
          POSTGRES_DB: peakpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: TypeScript check
        run: npm run build

      - name: Apply DB migrations
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: peakpass
          DB_PASSWORD: peakpass
          DB_NAME: peakpass
        run: npm run migrate:up

      - name: Run unit tests with coverage
        env:
          NODE_ENV: test
        run: npm test -- --coverage

      - name: Run integration tests (concurrency)
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: peakpass
          DB_PASSWORD: peakpass
          DB_NAME: peakpass
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
        run: npm run test:concurrency

      - name: Run integration tests (redis)
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: peakpass
          DB_PASSWORD: peakpass
          DB_NAME: peakpass
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
        run: npm run test:redis

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.8

      - name: Terraform Format
        run: terraform fmt -check -recursive terraform/

      - name: Terraform Init
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=terraform validate
